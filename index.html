<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kocaeli Açık Veri API Dizin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.6s ease-out backwards;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .card-header {
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            text-transform: capitalize;
            color: #e2e8f0;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10b981;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .file-item {
            margin-bottom: 0.5rem;
        }

        .file-link {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }

        .file-link:hover {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-hover);
        }

        .file-icon {
            margin-right: 0.75rem;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 3rem;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .empty-state {
            color: #ef4444;
            font-size: 0.9rem;
            padding: 0.5rem 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kocaeli Açık Veri API</h1>
        <p class="subtitle">Her saat başı otomatik güncellenen açık veri deposu.</p>
    </header>

    <div class="container" id="api-grid">
        <div class="loading">Veriler yükleniyor...</div>
    </div>

    <footer>
        Otomatik güncellenen <a href="https://github.com/Danilis567/ruti-api" target="_blank" style="color:var(--accent)">GitHub Deposu</a> üzerinden sunulmaktadır.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('api-grid');
            
            try {
                // Fetch the generated index
                const response = await fetch('api_index.json');
                if (!response.ok) throw new Error('API Index bulunamadı');
                
                const datasets = await response.json();
                
                grid.innerHTML = ''; // Clear loading
                
                datasets.forEach((dataset, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    const dateStr = dataset.lastUpdated 
                        ? new Date(dataset.lastUpdated).toLocaleString('tr-TR') 
                        : 'Hiç güncellenmedi';
                    
                    let filesHtml = '';
                    if (dataset.files && dataset.files.length > 0) {
                        filesHtml = '<ul class="file-list">';
                        dataset.files.forEach(file => {
                            const fileUrl = `downloads/${dataset.name}/${file}`;
                            filesHtml += `
                                <li class="file-item">
                                    <a href="${fileUrl}" class="file-link" target="_blank">
                                        <span class="file-icon">📄</span>
                                        ${file}
                                    </a>
                                </li>
                            `;
                        });
                        filesHtml += '</ul>';
                    } else {
                        filesHtml = '<div class="empty-state">Henüz dosya indirilmedi.</div>';
                    }
                    
                    const title = dataset.name.replace(/_/g, ' ');
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <h2 class="card-title">${title}</h2>
                            <div class="card-meta">
                                <span class="status-dot"></span>
                                Son Güncelleme: ${dateStr}
                            </div>
                        </div>
                        ${filesHtml}
                    `;
                    
                    grid.appendChild(card);
                });
                
            } catch (error) {
                grid.innerHTML = `<div class="loading" style="color:#ef4444">Hata: Veriler yüklenemedi. (${error.message})</div>`;
            }
        });
    </script>
</body>
</html>
