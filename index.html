<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kocaeli GTFS Open Data / API Index</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --header-bg: #21262d;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --link-color: #58a6ff;
            --link-hover: #79c0ff;
            --success-color: #3fb950;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            margin: 0;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 1012px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .repo-meta {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
        }

        .dataset-block {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--container-bg);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .dataset-header {
            background-color: var(--header-bg);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dataset-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dataset-name::before {
            content: "📁";
            font-size: 16px;
        }

        .dataset-info {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
        }

        .file-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .file-row {
            display: flex;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

        .file-row:last-child {
            border-bottom: none;
        }

        .file-row:hover {
            background-color: rgba(177, 186, 196, 0.04);
        }

        .file-icon {
            color: var(--text-muted);
            margin-right: 12px;
            font-family: var(--font-mono);
            font-size: 14px;
        }

        .file-name {
            flex: 1;
        }

        .file-name a {
            color: var(--text-main);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 13px;
        }

        .file-name a:hover {
            color: var(--link-color);
            text-decoration: underline;
        }

        .file-action {
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .file-action a {
            color: var(--link-color);
            text-decoration: none;
        }

        .file-action a:hover {
            text-decoration: underline;
        }

        .status-terminal {
            font-family: var(--font-mono);
            color: var(--success-color);
            font-size: 13px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--container-bg);
        }

        .empty-row {
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg aria-hidden="true" height="24" viewBox="0 0 16 16" version="1.1" width="24" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1v-1h-8a1 1 0 0 0-1 1Zm0-2.5v-1h-8a1 1 0 0 0-1 1Zm0-2.5v-1h-8a1 1 0 0 0-1 1Z"></path></svg>
                ruti-api / datasets
            </h1>
            <div class="repo-meta">
                <span>API Status: <span style="color: var(--success-color)">Online</span></span>
                <span>Type: Open Data Archive</span>
                <span id="last-check-time">Checking...</span>
            </div>
        </header>

        <div id="content">
            <div class="status-terminal">> Fetching api_index.json...<span style="animation: blink 1s step-end infinite;">_</span></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const content = document.getElementById('content');
            const timeLabel = document.getElementById('last-check-time');
            
            try {
                const response = await fetch('api_index.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const datasets = await response.json();
                content.innerHTML = ''; 

                let mostRecentUpdate = null;

                datasets.forEach(dataset => {
                    const block = document.createElement('div');
                    block.className = 'dataset-block';

                    let dateStr = 'Never updated';
                    if (dataset.lastUpdated) {
                        const dateObj = new Date(dataset.lastUpdated);
                        dateStr = dateObj.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
                        
                        if (!mostRecentUpdate || dateObj > mostRecentUpdate) {
                            mostRecentUpdate = dateObj;
                        }
                    }

                    let filesHtml = '<ul class="file-list">';
                    if (dataset.files && dataset.files.length > 0) {
                        dataset.files.forEach(file => {
                            const fileUrl = `downloads/${dataset.name}/${file}`;
                            filesHtml += `
                                <li class="file-row">
                                    <span class="file-icon">📄</span>
                                    <div class="file-name">
                                        <a href="${fileUrl}" target="_blank">${file}</a>
                                    </div>
                                    <div class="file-action">
                                        <a href="${fileUrl}" download>Download</a>
                                    </div>
                                </li>
                            `;
                        });
                    } else {
                        filesHtml += '<li class="empty-row">No files found in directory</li>';
                    }
                    filesHtml += '</ul>';

                    block.innerHTML = `
                        <div class="dataset-header">
                            <div class="dataset-name">${dataset.name}</div>
                            <div class="dataset-info">Updated: ${dateStr}</div>
                        </div>
                        ${filesHtml}
                    `;
                    content.appendChild(block);
                });

                if (mostRecentUpdate) {
                    timeLabel.innerText = `Last sync: ${mostRecentUpdate.toISOString().replace('T', ' ').substring(0, 19)} UTC`;
                }

            } catch (error) {
                content.innerHTML = `<div class="status-terminal" style="color: #ff7b72">> Error loading API index: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
